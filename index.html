<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What did you almost do today?</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        h1 {
            margin-bottom: 30px;
            color: #333;
            font-size: 24px;
        }
        .button-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            background-color: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover:not(:disabled) {
            background-color: #764ba2;
            transform: translateY(-2px);
        }
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        .message {
            margin-top: 20px;
            font-size: 18px;
            color: #667eea;
            font-weight: bold;
            min-height: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>What did you almost do today?</h1>
        <div class="button-container">
            <button onclick="recordAction('Almost quit')">Almost quit</button>
            <button onclick="recordAction('Almost bought')">Almost bought</button>
            <button onclick="recordAction('Almost said something')">Almost said something</button>
            <button onclick="recordAction('Almost left')">Almost left</button>
            <button onclick="recordAction('Almost changed something')">Almost changed something</button>
            <button onclick="recordAction('Almost reached out')">Almost reached out</button>
            <button onclick="recordAction('Almost gave up')">Almost gave up</button>
            <button onclick="recordAction('Almost started')">Almost started</button>
            <button onclick="recordAction('Almost waited')">Almost waited</button>
        </div>
        <div class="message" id="message"></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://vkqmdjkhklgkbahcyobl.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZrcW1kamtoa2xna2JhaGN5b2JsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3NjY5NjIsImV4cCI6MjA4OTM0Mjk2Mn0.DSRzgGnE_1ehJ800OGMgL-wezrtLsMRLywZbJmzFRk0';

        const { createClient } = window.supabase;
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function recordAction(action) {
            const buttons = document.querySelectorAll('button');
            const messageEl = document.getElementById('message');

            buttons.forEach(btn => btn.disabled = true);
            messageEl.textContent = '';

            try {
                const { data, error } = await supabase
                    .from('almost_actions')
                    .insert([
                        {
                            action: action,
                            created_at: new Date().toISOString()
                        }
                    ]);

                if (error) {
                    console.error('Error:', error);
                    messageEl.textContent = 'Error recording. Try again.';
                } else {
                    messageEl.textContent = 'Recorded.';
                    setTimeout(() => {
                        messageEl.textContent = '';
                        buttons.forEach(btn => btn.disabled = false);
                    }, 2000);
                }
            } catch (err) {
                console.error('Error:', err);
                messageEl.textContent = 'Error recording. Try again.';
                buttons.forEach(btn => btn.disabled = false);
            }
        }
    </script>
</body>
</html>
